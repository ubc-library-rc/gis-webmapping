<html>

<head>

  <title>Example 1</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Source for your Leaflet JavaScript and CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <!-- Make sure you put this AFTER Leaflet's CSS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!--Add scripts that link to data sources here-->
  <script src="./public-art.js" charset="utf-8"></script>
  <script src="./heritage-conservation-districts.js" charset="utf-8"></script>



</head>

<body>
  <!-- Your map's HTML container -->
  <div id="mapid" style="height: 100%;"></div>

  <script>

    // Initialize your map
    var mymap = L.map('mapid').setView([43.65, -79.38], 13);

    //Load the tile layer
    var OpenStreetMap_HOT = L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, Tiles style by <a href="https://www.hotosm.org/" target="_blank">Humanitarian OpenStreetMap Team</a> hosted by <a href="https://openstreetmap.fr/" target="_blank">OpenStreetMap France</a>'
    }).addTo(mymap);


    //load art point layer 
    L.geoJson(art, {
      onEachFeature: function (feature, layer) {
        layer.bindPopup(
          "<img src='" + feature.properties.ImageURL + "' width='200px'/><br><b>Title: </b>" + feature.properties.Title + "<br><b>Artist: </b>" + feature.properties.Artist);
      }
    }).addTo(mymap);


    //Add polygon layer (Heritage Conservation Areas) here
    L.geoJson(heritage, { onEachFeature, style: style }).addTo(mymap);

    function onEachFeature(feature, heritage) {
      { if (feature.properties && feature.properties.HCD_NAME) { heritage.bindPopup(feature.properties.HCD_NAME); } }
    }

    function style(feature, heritage) {
      return {
        fillColor: '#5E3A85',
        color: '#EBE1F0',
        weight: .5,
        fillOpacity: 0.8
      };
    }

  </script>


</body>

</html>
